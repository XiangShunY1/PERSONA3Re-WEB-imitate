<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var x = 1
        var x = y

        //等同于 x = x+y
        x += y
        //等同于 x = x-y
        x -= y
        //等同于 x = x*y
        x *=y
        //等同于 x = x/y
        x /= y
        //等同于 x = x%y
        x %= y

        //布尔运算符
        //且运算符（&&）————多个条件都要满足
        console.log(10<20 && 10>5) //true
        
        //或运算符（||）————满足一个条件即可
        console.log(10< 20 || 10<5) //true
    </script>
</body>
</html>
