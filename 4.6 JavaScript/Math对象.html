<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>

        var num = -100

        console.log(num);

        //Math.abs方法返回参数值的绝对值
        console.log(Math.abs(num));
        
        //Math.max Math.min 比较数字，判断大小

        console.log(Math.max(10,30,20,56,99));
        
        //Math.floor() 向下取整 ,Math.ceil() 向上取整
        console.log(Math.floor(3.8)); //3
        console.log(Math.floor(-3.2)); //-4
        
        console.log(Math.ceil(3.2)); //4
        console.log(Math.ceil(-3.2)); //-3
        

        //Math.random() 1>=0
        console.log(Math.random());
        
        // 10到20之间的随机数
        function getRandomArbitray(min,max){
            //最大值 - 最小值 * 随机数 = 0 ~ 最小值之间的随机数 + 最小值 = 10 ~ 20
            return Math.random()*(max-min) + min;
        }

        console.log(Math.floor(getRandomArbitray(10,20)));
        
        console.log(Math.floor(Math.random() * 2));
        

    </script>

</body>
</html>
