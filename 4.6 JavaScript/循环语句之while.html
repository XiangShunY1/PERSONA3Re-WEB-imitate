<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //打印1-1000的值
        var i = 1;
        while(i<=10){
            console.log(i)
            i++
        }
        //下面的例子是一个无限循环，因为循环条件总是为真
        //while(){
            //console.log("Hello,World")
        //}

        //所以的for循环都可以改写成while循环
        var x = 3
        var i = 0
        while(i<x){
            console.log(i)
            i++
        }
    </script>
</body>
</html>
