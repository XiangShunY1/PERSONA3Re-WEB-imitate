<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
    <script>
        var n = 10;
        //判断奇偶
        if(n%2 ===0){
            console.log("偶数")
        }

        //三元运算
        var num = 15
        num%2 ===0 ? console.log("偶数") : console.log("奇数")

        var result = num % 2 ===0 ? "偶数":"奇数"
        console.log(result)
    </script>
</body>
