<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>

        for(var i=0;i<=10;i++){
            if(i==5){
                //跳过当前循环，进行下一个循环
                continue;
                
            }else if(i==7){
                //结束循环
                break;
                console.log(i)
            }else{
                console.log(i)
            }
            
        }

    </script>
</body>
</html>
