<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //适合常量判断 更简洁美观
        var x= 5
        switch(x){
            //条件
            case 0:
                break;
            case 1:
                console.log("你好")
                break;
            //否则
            default:
                console.log("再见")
        }

    </script>
</body>
</html>
