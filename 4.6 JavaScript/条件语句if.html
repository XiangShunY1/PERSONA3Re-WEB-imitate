<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //适合多条件复杂判断
        var flag = false
        if(flag){
            //flag为true则输出我是真的
            //flag为false则不执行
            console.log("我是真的")
        }

        var num1 = 10
        var num2 = 20
        if(num1 < num2){
            //表达式
            console.log("num1小，num2大")
        }

        if(num1 >num2){
            console.log("我是个sb")
        }else{
            num1 +=10   //数值加10
            console.log(num1)//结果为20
        }

        //0-6：一周的七天
        //判断一下今天周几
        var day = 3 //周四
        if(day ===0){
            console.log("今天星期一")
        }else if(day ===1){
            console.log("今天是星期二")
        }else{
            console.log("我也不知道今天星期几")
        }


    </script>
</body>
</html>
