<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS新特性</title>
    <style>
        .radius{
            width: 56px;
            height: 56px;
            background-color: blueviolet;
            border-radius: 20px;
        }
        .shadow{
            width: 400px;
            height: 400px;
            background-color: beige;
            margin: 0 auto;
            /* 水平、垂直、模糊距离、颜色 */
            box-shadow: 10px 10px 20px gray;
        }
    </style>
</head>
<body>
    <div class="radius"></div>
    <div class="shadow"></div>
</body>
</html>
