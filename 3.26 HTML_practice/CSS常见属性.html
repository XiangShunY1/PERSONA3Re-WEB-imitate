<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS常用属性</title>
    <style>
        .block{
            background-color: aqua;
            width: 150px;
            height: 100px;
        }
        .inline{
            background-color: brown;
        }
        .inline-block{
            width: 100px;
            height: 150px;
        }
        .div-inline{
            display: inline;
            background-color: aquamarine;
        }
        .span-inline-block{
            display: inline-block;
            background-color: blueviolet;
            width: 300px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1 style="font: bolder 50px 'KaiTi';">这是一个 font 复合属性示例</h1>
    <p style="line-height: 40px;">这是一个长长长长长长长长长长长长长长长长长长长长长长长长长长长长长长长长长长长长长长长长长长长长长长长长长长长长长长长长长长长长长长长长长长长长长长长长长长长长长长长长长长长长长长长长长长文本</p>

    <!-- 

    块元素（block）： 块级元素通常会从新行开始，并占据整行的宽度。
                     可以包含其他块级元素和行内元素。
    
    行内元素（inline）：行内元素通常在同一行内呈现，不会独占一行。
                       它们只占据其内容所需的宽度，而不是整行的宽度。
    行内块元素（inline-block）：水平方向上排列，但可以设置宽度、高度、内外边距灯块级元素属性。
                               行内块元素可以包含其他行内元素或块级元素。
    -->

    <div class="block">这是一个块级元素</div>
    <span class="inline">这是一个行内元素</span>
    <img src="./img/HEPItzUakAAnQsh.jpg" alt="" class="inline-block">
    <h2>display</h2>
    <div class="div-inline">这是一个转换成行内块的div标签</div>
    <span class="span-inline-block">这是一个转换成行内块元素的标签</span>
</body>
</html>
